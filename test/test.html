<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn tailwind</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms,aspect-ratio"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1fb6ff",
              secondary: "#7e5bef",
            },
            spacing: {
              128: "32rem",
            },
            fontFamily: {
              sans: ["Graphik", "sans-serif"],
            },
            boxShadow: {
              soft: "0 6px 20px 2px rgba(0, 0, 0, 0.4)",
            },
          },
        },
        // Kích hoạt các plugin chính thức nếu cần
        plugins: [
          // tailwind.plugin.lineClamp,
        ],
      };
    </script>

    <style type="text/tailwindcss">
      @layer base {
        h1 {
          @apply text-2xl font-bold;
        }
        table {
          @apply border-collapse;
        }
      }

      @layer components {
        .btn {
          @apply px-4 py-2 rounded-lg font-semibold transition-all bg-blue-700 rounded-md border-2 border-red-700 text-white font-bold;
        }
      }
      @layer utilities {
        .content-auto {
          content-visibility: auto;
        }
      }
    </style>

    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body class="flex justify-center items-center h-screen">
    <div class="w-[640px] h-[464px] shadow-soft rounded-[24px] p-[72px]">
      <form action="" class="flex gap-[12px]">
        <div
          class="flex items-center gap-[10px] p-[16px] rounded border border-[#DBD5EC] grow-[1]"
        >
          <label for=""
            ><svg
              width="22"
              height="22"
              viewBox="0 0 22 22"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g opacity="0.54" clip-path="url(#clip0_2_7)">
                <path
                  d="M9.16667 15.5833C12.7105 15.5833 15.5833 12.7105 15.5833 9.16667C15.5833 5.62284 12.7105 2.75 9.16667 2.75C5.62284 2.75 2.75 5.62284 2.75 9.16667C2.75 12.7105 5.62284 15.5833 9.16667 15.5833Z"
                  stroke="#281A51"
                  stroke-width="1.375"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M19.25 19.25L13.75 13.75"
                  stroke="#281A51"
                  stroke-width="1.375"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <defs>
                <clipPath id="clip0_2_7">
                  <rect width="22" height="22" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </label>
          <input
            class="border-none focus:ring-0"
            type="email"
            placeholder="Search for a part-time job"
          />
        </div>
        <button class="p-4">
          <svg
            width="22"
            height="22"
            viewBox="0 0 22 22"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g clip-path="url(#clip0_2_18)">
              <path
                d="M2.75 6.41666L8.25 3.66666L13.75 6.41666L19.25 3.66666V15.5833L13.75 18.3333L8.25 15.5833L2.75 18.3333V6.41666Z"
                stroke="white"
                stroke-width="1.375"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M8.25 3.66666V15.5833"
                stroke="white"
                stroke-width="1.375"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M13.75 6.41666V18.3333"
                stroke="white"
                stroke-width="1.375"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </g>
            <defs>
              <clipPath id="clip0_2_18">
                <rect width="22" height="22" fill="white" />
              </clipPath>
            </defs>
          </svg>
          Use map
        </button>
      </form>
    </div>
  </body>
</html>
