<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="rs.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-family: "Poppins", sans-serif;
        color: rgba(14, 14, 56, 1);
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(216, 218, 226);
        position: relative;
      }

      .container {
        max-width: 1563px;
        max-height: 777px;
        width: 100%;
        height: auto;
        aspect-ratio: 1563 / 777;

        border-radius: 26px;
        padding: 62px;
        background-color: rgba(239, 240, 241, 1);

        display: flex;
        flex-direction: column;
        gap: 56px;
        box-shadow: 0px 76px 27px 0px rgba(6, 27, 82, 0.1);
      }

      .collection-header {
        display: flex;
        flex-direction: column;
        gap: 24px;
        h1 {
          font-weight: 700;
          font-size: 32px;
          color: rgba(14, 14, 56, 1);
          font-family: "Merriweather", serif;
        }

        .collection-fillter {
          display: flex;
          gap: 8px;
          a {
            color: rgba(14, 14, 56, 1);
            text-decoration: none;
            padding: 8px;
            background-color: rgba(255, 255, 255, 1);
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
          }
        }
      }

      .collections-list {
        display: flex;
        gap: 64px;

        .collection-card {
          display: flex;
          flex-direction: column;
          gap: 24px;
          width: 437px;
          height: 489px;
          border-radius: 32px;
          background-color: rgba(255, 255, 255, 1);
          padding: 24px;
        }
      }

      .img-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        .imgs {
          display: flex;
          gap: 16px;
          img {
            width: 119px;
            height: 97px;
          }
        }
      }

      .collection-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        .title {
          font-weight: 500;
          font-size: 24px;
        }
        .status {
          display: flex;
          align-items: center;
          gap: 4px;
          .img-count {
            font-weight: 500;
            font-size: 16px;
          }
        }
      }
    </style>
    <title>Document</title>
  </head>
