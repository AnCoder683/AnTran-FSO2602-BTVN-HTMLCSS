        align-items: center;

        display: flex;
        gap: 1rem;
      }
      .container {
        width: 80%;
        padding: 1rem 1rem 2rem 1rem;
        border: 1px solid #ccc;
        border-radius: 1rem;
      }

        list-style-type: none;
        padding: 0;
        display: flex;
        gap: 0.2rem;
      }
      li {

        margin-bottom: 5px;
        border-radius: 0.2rem;
      }
      .colection {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        width: 33%;
        border: 1px solid #cccccc;
        border-radius: 1rem;
        padding: 2rem 1rem;
      }
      .main-img img {
        width: 100%;
        border-radius: 0.5rem;
      }
      .imgs-list {
        display: flex;
        gap: 0.2rem;
        margin-top: 0.5rem;
      }
      .imgs-list img {
        width: 33%;
      }
      .ref {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.5rem;
      }
      .ref p {
        margin: 0;
      }
      .image-count {
        display: flex;
        align-items: center;
        gap: 0.2rem;
        line-height: 100%;
      }
