<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="rs.css" />
    <title>Login</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      html {
        font-family: "Helvetica", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgb(249, 249, 249);
      }

      .container {
        display: flex;
        flex-direction: column;
        /* justify-content: center; */
        align-items: center;
        gap: 24px;
      }

      h1 {
        font-weight: 400;
        font-size: 24px;
      }

      form {
        display: flex;
        flex-direction: column;
        width: 320px;
        height: 282px;
        padding: 24px;
        gap: 24px;
        border-radius: 8px;
        background-color: rgba(255, 255, 255, 1);
        box-shadow: 0 0 10px 2px rgba(17, 17, 17, 0.301);
        .input-group {
          display: flex;
          flex-direction: column;
          gap: 8px;

          label {
            font-weight: 400;
            font-size: 14px;
            color: rgba(17, 17, 17, 1);
          }

          input {
            width: 272px;
            height: 32px;
            border-radius: 4px;
            border: 1px solid rgba(217, 217, 217, 1);
            padding: 8px;
            font-size: 14px;
            font-weight: 400px;
            background-color: rgb(250, 250, 250);
          }

          .forgot-pass {
            display: flex;
            justify-content: space-between;
            a {
              text-decoration: none;
              color: rgba(0, 122, 255, 1);
              font-weight: 400;
              font-size: 14px;
            }
          }
        }

        button {
          width: 272px;
          height: 34px;
          padding: 8px;
          border-radius: 8px;
          background-color: rgba(0, 136, 255, 1);
          border: none;
          color: rgba(255, 255, 255, 1);
          font-weight: 800;
          font-size: 16px;
          cursor: pointer;
          /* can giua */
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .text {
          width: 272px;
          height: 16px;
          font-weight: 400;
          font-size: 14px;
          display: flex;
          justify-content: center;
          a {
            text-decoration: none;
            color: rgba(0, 122, 255, 1);
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <form>
        <div class="input-group">
          <label for="username">Email</label>
          <input type="email" placeholder="example@email.com" />
        </div>
        <div class="input-group">
          <div class="forgot-pass">
            <label for="password">Password</label>
            <a href="">Forgot password?</a>
          </div>
          <input type="password" placeholder="************" />
        </div>
        <button type="submit">Login</button>
        <p class="text">
          Don't have an account?
          <a href="">Create new Account</a>
        </p>
      </form>
    </div>
  </body>
</html>
